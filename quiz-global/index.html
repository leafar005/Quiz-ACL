<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repaso Global (50 Preguntas) | ACL 2026</title>
  <meta name="description" content="Cuestionario global de 50 preguntas aleatorias de los 3 temas de ACL 2026.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/shared.js"></script>
</head>
<body>
  <!-- Animated background -->
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>

  <!-- Main App Container -->
  <div id="app">



    <!-- ========== QUIZ SCREEN ========== -->
    <section id="quiz-screen" class="screen active">
      <header class="quiz-header">
        <div class="quiz-header-left">
          <button class="btn-icon" id="btn-quit" title="Salir">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          </button>
          <div class="quiz-progress-info">
            <span id="quiz-current">1</span> / <span id="quiz-total">50</span>
          </div>
        </div>
        <div class="quiz-header-center">
          <div class="progress-bar-container">
            <div class="progress-bar" id="progress-bar"></div>
          </div>
        </div>
        <div class="quiz-header-right">
          <div class="score-display">
            <span class="score-correct" id="score-correct">0</span>
            <span class="score-sep">/</span>
            <span class="score-wrong" id="score-wrong">0</span>
          </div>
        </div>
      </header>

      <main class="quiz-body">
        <div class="question-card" id="question-card">
          <div class="question-meta">
            <span class="question-category" id="question-category">Categoría</span>
            <span class="question-type" id="question-type">V/F</span>
          </div>
          <h2 class="question-text" id="question-text">¿Pregunta?</h2>

          <div class="options-container" id="options-container">
            <!-- Populated by JS -->
          </div>

          <!-- Justification Panel -->
          <div class="justification-panel hidden" id="justification-panel">
            <div class="justification-header" id="justification-header">
              <span class="justification-icon" id="justification-icon">✓</span>
              <span class="justification-label" id="justification-label">¡Correcto!</span>
            </div>
            <div class="justification-body">
              <p class="justification-text" id="justification-text"></p>
            </div>
          </div>

          <div class="question-actions hidden" id="question-actions">
            <button class="btn-secondary" id="btn-prev" style="margin-right: auto; padding: 12px 24px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: #fff; cursor: pointer; font-weight: 600;">← Anterior</button>
            <button class="btn-primary" id="btn-next">
              Siguiente →
            </button>
          </div>
        </div>
      </main>
    </section>

    <!-- ========== RESULTS SCREEN ========== -->
    <section id="results-screen" class="screen">
      <div class="results-content">
        <div class="results-hero">
          <div class="results-score-ring">
            <svg viewBox="0 0 120 120" class="score-ring-svg">
              <circle cx="60" cy="60" r="54" class="ring-bg"/>
              <circle cx="60" cy="60" r="54" class="ring-fill" id="ring-fill"/>
            </svg>
            <div class="score-ring-text">
              <span class="score-ring-pct" id="results-pct">0%</span>
            </div>
          </div>
          <h2 class="results-title" id="results-title">Resultado</h2>
          <p class="results-subtitle" id="results-subtitle">Has acertado X de Y preguntas</p>
        </div>

        <div class="results-stats">
          <div class="stat-card stat-correct">
            <div class="stat-value" id="stat-correct">0</div>
            <div class="stat-label">Correctas</div>
          </div>
          <div class="stat-card stat-wrong">
            <div class="stat-value" id="stat-wrong">0</div>
            <div class="stat-label">Incorrectas</div>
          </div>
          <div class="stat-card stat-time">
            <div class="stat-value" id="stat-time">0:00</div>
            <div class="stat-label">Tiempo</div>
          </div>
        </div>

        <!-- Review section -->
        <div class="results-review">
          <h3 class="review-title">Revisión de respuestas</h3>
          <div class="review-filters">
            <button class="review-filter active" data-filter="all" id="filter-all">Todas</button>
            <button class="review-filter" data-filter="wrong" id="filter-wrong">❌ Incorrectas</button>
            <button class="review-filter" data-filter="correct" id="filter-correct">✅ Correctas</button>
          </div>
          <div class="review-list" id="review-list">
            <!-- Populated by JS -->
          </div>
        </div>

        <div class="results-actions">
          <button class="btn-primary" id="btn-retry">🔄 Repetir</button>
          <button class="btn-secondary" id="btn-home">🏠 Inicio</button>
        </div>
      </div>
    </section>

  </div>

  <script src="../shared/flashcards-data.js"></script>
  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
