<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Banco de Preguntas | ACL 2026</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../shared/shared.css">
  <script src="../shared/shared.js"></script>
  <style>
    :root {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-card: #1a1f35;
      --bg-card-hover: #1e243d;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --accent: #6366f1;
      --accent-hover: #4f46e5;
      --correct: #10b981;
      --correct-bg: rgba(16, 185, 129, 0.1);
      --incorrect: #ef4444;
      --justification-bg: rgba(99, 102, 241, 0.1);
      --radius-md: 12px;
      --radius-lg: 16px;
      --border-subtle: rgba(255, 255, 255, 0.08);
    }
    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      background-image: 
        radial-gradient(circle at 15% 0%, rgba(99, 102, 241, 0.08), transparent 30%),
        radial-gradient(circle at 85% 100%, rgba(167, 139, 250, 0.08), transparent 30%);
      background-attachment: fixed;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 800;
      margin: 0;
      background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .back-to-portal {
      position: fixed;
      top: 30px;
      left: 30px;
      color: var(--text-secondary);
      text-decoration: none;
      font-weight: 500;
      font-size: 0.9rem;
      padding: 8px 16px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border-subtle);
      transition: all 0.2s;
      z-index: 100;
    }
    .back-to-portal:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
      transform: translateX(-3px);
    }
    
    .category-section {
      margin-bottom: 60px;
    }
    .category-title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      color: #e5e7eb;
      padding: 10px 20px;
      background: rgba(255,255,255,0.03);
      border-radius: var(--radius-md);
      border-left: 4px solid var(--accent);
    }
    
    .question-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .question-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
      gap: 15px;
    }
    .question-text {
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.5;
      margin: 0;
    }
    .question-type-badge {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
    }
    .badge-multi { background: rgba(59, 130, 246, 0.15); color: #60a5fa; }
    .badge-vf { background: rgba(168, 85, 247, 0.15); color: #c084fc; }
    
    .options-list {
      list-style: none;
      padding: 0;
      margin: 0 0 20px 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .option-item {
      padding: 12px 16px;
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      background: rgba(0,0,0,0.2);
      font-size: 0.95rem;
      line-height: 1.4;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .option-item.correct {
      background: var(--correct-bg);
      border-color: rgba(16, 185, 129, 0.3);
      color: #fff;
    }
    .option-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 0.7rem;
    }
    .option-item.correct .option-icon {
      background: var(--correct);
      color: #000;
    }
    .option-item.incorrect .option-icon {
      background: var(--bg-secondary);
      border: 1px solid var(--border-subtle);
      color: transparent;
    }
    
    .justification {
      background: var(--justification-bg);
      border-left: 3px solid var(--accent);
      padding: 16px;
      border-radius: 0 var(--radius-md) var(--radius-md) 0;
      font-size: 0.95rem;
      line-height: 1.5;
      color: #d1d5db;
      display: flex;
      gap: 12px;
    }
    .justification-icon {
      font-size: 1.2rem;
      flex-shrink: 0;
    }
    
    .toc {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 40px;
    }
    .toc h3 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 1.1rem;
      color: var(--text-primary);
    }
    .toc-module-group {
      margin-bottom: 24px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border-subtle);
    }
    .toc-module-group:last-child {
      border-bottom: none;
      margin-bottom: 0;
      padding-bottom: 0;
    }
    .toc-module-title {
      font-size: 1.05rem;
      color: var(--accent);
      margin-top: 0;
      margin-bottom: 12px;
      font-weight: 700;
    }
    .module-title {
      font-size: 2rem;
      font-weight: 800;
      margin: 60px 0 30px 0;
      padding-bottom: 15px;
      border-bottom: 2px solid var(--accent);
      color: #fff;
    }
    .toc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 12px;
    }
    .toc-link {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s;
    }
    .toc-link:hover {
      color: var(--accent);
    }
    
    .search-container {
      margin-bottom: 30px;
      position: relative;
    }
    .search-input {
      width: 100%;
      padding: 16px 20px 16px 50px;
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-subtle);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 1.05rem;
      font-family: inherit;
      box-sizing: border-box;
      transition: all 0.2s;
    }
    .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    }
    .search-icon {
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-secondary);
      font-size: 1.2rem;
    }
    

    body.light-theme {
      --bg-primary: #f0f4f8;
      --bg-secondary: #ffffff;
      --bg-card: #ffffff;
      --bg-card-hover: #f9fafb;
      --text-primary: #111827;
      --text-secondary: #4b5563;
      --border-subtle: rgba(0, 0, 0, 0.1);
      --justification-bg: rgba(99, 102, 241, 0.05);
    }

    body.light-theme .option-item {
      background: #f9fafb;
    }
    body.light-theme .category-title {
      background: #e0e7ff;
      color: #111827;
    }
    @media (max-width: 600px) {
      .header {
        flex-direction: column;
        gap: 20px;
        align-items: flex-start;
      }
    }
  </style>
  
</head>
<body>
  <a href="../index.html" class="back-to-portal">← Volver al portal</a>
  <div class="container">
    <div class="header" style="justify-content: center;">
      <h1>Banco de Preguntas</h1>
    </div>

    <div class="search-container">
      <div class="search-icon">🔍</div>
      <input type="text" id="search-input" class="search-input" placeholder="Buscar por palabra clave en la pregunta, opciones o justificación...">
    </div>

    <div id="toc-container" class="toc">
      <h3>Temario</h3>
      <!-- Modules will be inserted here -->
    </div>

    <div id="content">
      <!-- Generated via JS -->
    </div>
  </div>

  <script src="../quiz-global/questions.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const content = document.getElementById('content');
      const searchInput = document.getElementById('search-input');
      const tocContainer = document.getElementById('toc-container');
      
      // We assume CATEGORIES and QUESTIONS are defined globally by questions.js
      if (typeof CATEGORIES === 'undefined' || typeof QUESTIONS === 'undefined') {
        content.innerHTML = '<p>Error al cargar el banco de preguntas.</p>';
        return;
      }
      
      const searchData = [];
      const normalizeText = (text) => text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");

      const modules = [
        { name: "⚡ Calidad e ISO 9000", categories: CATEGORIES.slice(0, 7) },
        { name: "🏛️ CMMI Modelo + Eval.", categories: CATEGORIES.slice(7, 15) },
        { name: "📐 Otros Modelos + Medición", categories: CATEGORIES.slice(15, 23) },
        { name: "⚙️ SGCS Práctica", categories: CATEGORIES.slice(32, 37) },
        { name: "📋 Auditorías Internas (PAI)", categories: CATEGORIES.slice(23, 32) }
      ];

      // Because there are duplicate category IDs in the global file (like 'trampas'),
      // we must distribute questions carefully or just filter by ID but only process them once.
      // Since a duplicate ID means `QUESTIONS.filter` grabs both, we just rely on standard filtering
      // and accept that "Trampas" might include both. 
      // Actually, since we process by module, if a category ID is duplicate, it will render twice.
      // We'll leave it as is since it reflects the data structure.

      modules.forEach((mod, modIdx) => {
        const categoriesWithQuestions = mod.categories.map(cat => {
          const catQs = QUESTIONS.filter(q => q.category === cat.id);
          return { ...cat, questions: catQs };
        }).filter(cat => cat.questions.length > 0);

        if (categoriesWithQuestions.length === 0) return;

        const modUniqueId = `mod-${modIdx}`;
        // TOC Group
        const tocGroup = document.createElement('div');
        tocGroup.className = 'toc-module-group';
        tocGroup.innerHTML = `<a href="#${modUniqueId}" style="text-decoration: none; color: inherit; display: block; transition: opacity 0.2s;" onmouseover="this.style.opacity=0.8" onmouseout="this.style.opacity=1"><h4 class="toc-module-title" style="cursor: pointer;">${mod.name}</h4></a><div class="toc-grid"></div>`;
        const tocGrid = tocGroup.querySelector('.toc-grid');
        tocContainer.appendChild(tocGroup);

        // Content Section Group
        const modSectionGroup = document.createElement('div');
        modSectionGroup.className = 'module-section-group';
        modSectionGroup.id = modUniqueId;
        modSectionGroup.innerHTML = `<h1 class="module-title">${mod.name}</h1>`;
        
        categoriesWithQuestions.forEach((cat, catIdx) => {
          // Unique ID for anchor due to duplicate IDs in original array
          const uniqueId = `cat-${modIdx}-${catIdx}`;
          
          // Add to TOC
          const tocLink = document.createElement('a');
          tocLink.href = `#${uniqueId}`;
          tocLink.className = 'toc-link';
          tocLink.innerHTML = `<span>${cat.icon}</span> ${cat.name} <span style="opacity: 0.5; font-size: 0.8rem;">(${cat.questions.length})</span>`;
          tocGrid.appendChild(tocLink);
          
          // Sort questions: multi first, then vf
          cat.questions.sort((a, b) => {
            if (a.type === b.type) return 0;
            return a.type === 'multi' ? -1 : 1;
          });
          
          // Create Section
          const section = document.createElement('div');
          section.className = 'category-section';
          section.id = uniqueId;
          
          const title = document.createElement('h2');
          title.className = 'category-title';
          title.innerHTML = `<span>${cat.icon}</span> ${cat.name}`;
          section.appendChild(title);
          
          // Add questions
          cat.questions.forEach((q, index) => {
            const card = document.createElement('div');
            card.className = 'question-card';
            
            let typeLabel = q.type === 'multi' ? 'Múltiple' : 'V/F';
            if (q.trap) typeLabel += ' ⚠️ Trampa';
            if (q.isEnumeration) typeLabel += ' 📋 Enumeración';
            if (q.isDefinition) typeLabel += ' 📖 Definición';
            const typeClass = q.type === 'multi' ? 'badge-multi' : 'badge-vf';
            
            let optionsHtml = '';
            q.options.forEach((opt, i) => {
              const isCorrect = i === q.correct;
              const itemClass = isCorrect ? 'option-item correct' : 'option-item incorrect';
              const icon = isCorrect ? '✓' : '';
              optionsHtml += `
                <li class="${itemClass}">
                  <div class="option-icon">${icon}</div>
                  <div>${opt}</div>
                </li>
              `;
            });
            
            card.innerHTML = `
              <div class="question-header">
                <h3 class="question-text">${index + 1}. ${q.question}</h3>
                <span class="question-type-badge ${typeClass}">${typeLabel}</span>
              </div>
              <ul class="options-list">
                ${optionsHtml}
              </ul>
              <div class="justification">
                <div class="justification-icon">💡</div>
                <div>${q.justification || '<em>Sin justificación adicional.</em>'}</div>
              </div>
            `;
            
            section.appendChild(card);
            
            searchData.push({
              card,
              section,
              searchableText: normalizeText(`${q.question} ${q.options.join(' ')} ${q.justification || ''}`)
            });
          });
          
          modSectionGroup.appendChild(section);
        });
        
        content.appendChild(modSectionGroup);
      });

      // Search functionality
      searchInput.addEventListener('input', (e) => {
        const query = normalizeText(e.target.value);
        const sectionCounts = new Map();
        
        searchData.forEach(item => {
          if (item.searchableText.includes(query)) {
            item.card.style.display = '';
            sectionCounts.set(item.section, (sectionCounts.get(item.section) || 0) + 1);
          } else {
            item.card.style.display = 'none';
          }
        });
        
        // Hide/show sections
        document.querySelectorAll('.category-section').forEach(sec => {
          if (sectionCounts.get(sec)) {
            sec.style.display = '';
          } else {
            sec.style.display = 'none';
          }
        });

        // Hide/show module titles
        document.querySelectorAll('.module-section-group').forEach(mod => {
          const hasVisibleSections = Array.from(mod.querySelectorAll('.category-section')).some(sec => sec.style.display !== 'none');
          mod.style.display = hasVisibleSections ? '' : 'none';
        });

        if (query.length > 0) {
          tocContainer.style.display = 'none';
        } else {
          tocContainer.style.display = '';
        }
      });
    });

    // --- Back to Top Button ---
    const topBtn = document.createElement('button');
    topBtn.innerHTML = '↑';
    topBtn.title = 'Volver arriba';
    topBtn.style.position = 'fixed';
    topBtn.style.bottom = '24px';
    topBtn.style.right = '24px';
    topBtn.style.width = '50px';
    topBtn.style.height = '50px';
    topBtn.style.borderRadius = '50%';
    topBtn.style.background = 'var(--accent, #6366f1)';
    topBtn.style.color = '#fff';
    topBtn.style.border = 'none';
    topBtn.style.fontSize = '1.5rem';
    topBtn.style.cursor = 'pointer';
    topBtn.style.boxShadow = '0 4px 12px rgba(0,0,0,0.3)';
    topBtn.style.opacity = '0';
    topBtn.style.pointerEvents = 'none';
    topBtn.style.transition = 'opacity 0.3s, transform 0.2s';
    topBtn.style.zIndex = '9999';
    topBtn.style.display = 'flex';
    topBtn.style.alignItems = 'center';
    topBtn.style.justifyContent = 'center';
    
    topBtn.onmouseover = () => topBtn.style.transform = 'translateY(-3px)';
    topBtn.onmouseout = () => topBtn.style.transform = 'translateY(0)';
    
    topBtn.onclick = () => window.scrollTo({ top: 0, behavior: 'smooth' });
    document.body.appendChild(topBtn);

    window.addEventListener('scroll', () => {
      if (window.scrollY > 300) {
        topBtn.style.opacity = '1';
        topBtn.style.pointerEvents = 'auto';
      } else {
        topBtn.style.opacity = '0';
        topBtn.style.pointerEvents = 'none';
      }
    });
  </script>
</body>
</html>
